<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Meros Portali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FDF8E1; --text: #451A03; --ornament: #B45309; --border: #FDE68A; --card: #FFFCF0; 
            --arab-size: 36px; --uzb-size: 19px; 
        }
        body.day-mode { --bg: #F0F9FF; --text: #075985; --ornament: #0284C7; --border: #BAE6FD; --card: #ffffff; }
        body.book-mode { --bg: #FDF8E1; --text: #451A03; --ornament: #B45309; --border: #FDE68A; --card: #FFFCF0; }
        body.night-mode { --bg: #020617; --text: #BAE6FD; --ornament: #EAB308; --border: #1E293B; --card: #0F172A; }

        body { background-color: var(--bg); color: var(--text); transition: 0.3s; font-family: 'Inter', sans-serif; margin: 0; }
        
        .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: var(--bg); border-bottom: 3px solid var(--ornament); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        
        .arab-text { font-family: 'Amiri', serif; text-align: right; line-height: 1.8; font-size: var(--arab-size); direction: rtl; }
        .uzb-text { font-family: 'Lora', serif; font-size: var(--uzb-size); line-height: 1.6; }
        
        .selection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .item-card { background: var(--card); border: 2px solid var(--border); padding: 30px; border-radius: 20px; cursor: pointer; text-align: center; transition: 0.3s; }
        .item-card:hover { border-color: var(--ornament); transform: translateY(-3px); }

        .tab-wrapper { display: flex; gap: 5px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 12px; }
        .tab-trigger { flex: 1; padding: 10px 2px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; color: var(--text); opacity: 0.6; }
        .tab-trigger.active { background: var(--ornament); color: white !important; opacity: 1; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block !important; }

        /* Sozlamalar paneli */
        #settings-panel { position: fixed; top: 0; right: -350px; width: 340px; height: 100%; background: var(--card); border-left: 4px solid var(--ornament); z-index: 2000; transition: 0.4s; padding: 25px; overflow-y: auto; }
        #settings-panel.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .btn-opt { flex: 1; padding: 8px; border: 2px solid var(--ornament); border-radius: 8px; font-weight: 800; font-size: 10px; color: var(--text); background: transparent; }
        .btn-opt.active { background: var(--ornament); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="init()" class="day-mode">

    <header class="top-nav">
        <div class="flex items-center gap-4">
            <button id="back-btn" onclick="goBack()" class="hidden text-2xl font-black p-2">←</button>
            <div class="flex flex-col">
                <span class="font-black text-2xl tracking-tighter leading-none">AVODOD</span>
                <span class="text-[10px] font-bold opacity-60 tracking-[0.3em] uppercase mt-1">Meros Portali</span>
            </div>
        </div>
        <button onclick="toggleSettings(true)" class="p-2 text-[var(--ornament)]">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
    </header>

    <div id="overlay" class="overlay" onclick="toggleSettings(false)"></div>
    <aside id="settings-panel">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl italic">AVODOD 🏛️</h3>
            <button onclick="toggleSettings(false)" class="opacity-50 text-xl">✕</button>
        </div>

        <div class="mb-8 p-4 bg-black/5 rounded-xl border border-[var(--ornament)]/20">
            <p class="text-[11px] leading-relaxed mb-4">
                <b>AVODOD</b> — "Ajdod" va "Avlod" o‘rtasidagi raqamli ko‘prik.
            </p>
            <div class="text-[10px] space-y-3">
                <div class="border-t border-[var(--ornament)]/10 pt-2">
                    <span class="font-bold opacity-50 uppercase">Muallif:</span><br>
                    <b>Dilorom Yusupova Husan qizi</b><br>
                    <i>Filolog, tadqiqotchi va dasturchi</i>
                </div>
                <div class="flex items-center gap-2 pt-1 text-[var(--ornament)]">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <a href="mailto:Diloromyusupova94@gmail.com" class="font-bold hover:underline">Diloromyusupova94@gmail.com</a>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div>
                <span class="text-[10px] font-bold block mb-2 opacity-50 uppercase">Mavzu</span>
                <div class="flex gap-2">
                    <button onclick="setTheme('day')" id="t-day" class="btn-opt active">KUN</button>
                    <button onclick="setTheme('book')" id="t-book" class="btn-opt">KITOB</button>
                    <button onclick="setTheme('night')" id="t-night" class="btn-opt">TUN</button>
                </div>
            </div>
            <div>
                <span class="text-[10px] font-bold block mb-2 opacity-50 uppercase">Arabcha shrift: <span id="arab-val">36</span>px</span>
                <div class="flex gap-2">
                    <button onclick="changeFontSize('arab', -2)" class="btn-opt">－</button>
                    <button onclick="changeFontSize('arab', 2)" class="btn-opt">＋</button>
                </div>
            </div>
            <div>
                <span class="text-[10px] font-bold block mb-2 opacity-50 uppercase">O'zbekcha shrift: <span id="uzb-val">19</span>px</span>
                <div class="flex gap-2">
                    <button onclick="changeFontSize('uzb', -1)" class="btn-opt">－</button>
                    <button onclick="changeFontSize('uzb', 1)" class="btn-opt">＋</button>
                </div>
            </div>
        </div>
    </aside>

    <main id="app-container" class="pt-28 pb-20"></main>

    <script>
        let view = 'olimlar';
        let state = { o: '', a: '' };
        
        const db = {
            "xorazmiy": { ism: "Muhammad al-Xorazmiy", asarlar: { "al-jabr": { nomi: "Al-Jabr va Al-Muqobala", file: "al-jabr.json" } } },
            "beruniy": { ism: "Abu Rayhon Beruniy", asarlar: { "hindiston": { nomi: "Tahqiq ma lil-Hind", file: "hindiston.json" } } }
        };

        function init() { renderOlimlar(); }

        function toggleSettings(s) {
            document.getElementById('settings-panel').classList.toggle('open', s);
            document.getElementById('overlay').classList.toggle('active', s);
        }

        function renderOlimlar() {
            view = 'olimlar';
            document.getElementById('back-btn').classList.add('hidden');
            let h = `<div class="max-w-4xl mx-auto px-5">
                <h2 class="text-xs font-black opacity-40 tracking-[0.3em] uppercase mb-10 text-center">Allomalar merosi</h2>
                <div class="selection-grid" style="padding:0;">`;
            for(let k in db) h += `<div class="item-card" onclick="selectOlim('${k}')"><h2 class="font-black text-xl">${db[k].ism}</h2></div>`;
            document.getElementById('app-container').innerHTML = h + '</div></div>';
        }

        function selectOlim(k) {
            state.o = k; view = 'asarlar';
            document.getElementById('back-btn').classList.remove('hidden');
            let h = '<div class="selection-grid">';
            for(let a in db[k].asarlar) h += `<div class="item-card" onclick="loadAsar('${k}','${a}')"><h2 class="font-bold text-lg">${db[k].asarlar[a].nomi}</h2></div>`;
            document.getElementById('app-container').innerHTML = h + '</div>';
        }

        async function loadAsar(o, a) {
            state.a = a; view = 'boblar';
            try {
                const res = await fetch(`sources/${o}/${db[o].asarlar[a].file}`);
                const data = await res.json();
                const annotatsiya = data[0].asar_haqida || "Ma'lumot yo'q.";
                const manbalar = data[0].manbalar || [];

                let h = `
                <div class="max-w-4xl mx-auto px-5 mb-10">
                    <div class="bg-[var(--card)] p-6 rounded-2xl border-2 border-[var(--border)]">
                        <h3 class="font-black text-[10px] opacity-40 mb-2 uppercase tracking-widest">Asar haqida</h3>
                        <p class="text-sm opacity-80 mb-4 italic">${annotatsiya}</p>
                        ${manbalar.length > 0 ? `
                            <ul class="text-[10px] list-disc pl-5 opacity-60">
                                ${manbalar.map(m => `<li class="mb-1">${m}</li>`).join('')}
                            </ul>` : ''}
                    </div>
                </div>
                <div class="selection-grid" style="padding-top:0;">`;
                
                data.slice(1).forEach((b) => {
                    const m = btoa(unescape(encodeURIComponent(JSON.stringify(b.matnlar))));
                    h += `<div class="item-card" onclick="renderMatn('${m}')"><h2 class="font-bold">${b.bob_nomi}</h2></div>`;
                });
                document.getElementById('app-container').innerHTML = h + '</div>';
            } catch(e) { alert("Xatolik!"); }
        }

        function renderMatn(mStr) {
            view = 'matn';
            const matnlar = JSON.parse(decodeURIComponent(escape(atob(mStr))));
            let h = `<div class="max-w-4xl mx-auto px-5">
                <div class="flex justify-center mb-8 gap-2">
                    <button onclick="toggleView('study')" id="btn-study" class="btn-opt active" style="font-size:12px; padding:10px 20px;">Ilmiy Tahlil</button>
                    <button onclick="toggleView('read')" id="btn-read" class="btn-opt" style="font-size:12px; padding:10px 20px;">Yaxlit Mutolaa</button>
                </div>
                <div id="study-view">`;
            
            matnlar.forEach((item, index) => {
                h += `<div class="bg-[var(--card)] border border-[var(--border)] rounded-3xl p-6 mb-6 content-card">
                    <div class="tab-wrapper">
                        <button class="tab-trigger active" onclick="showTab(this, 'ar-${index}')">Matn</button>
                        <button class="tab-trigger" onclick="showTab(this, 'uz-${index}')">Tarjima</button>
                        <button class="tab-trigger" onclick="showTab(this, 'iz-${index}')">Izoh</button>
                    </div>
                    <div id="ar-${index}" class="tab-panel active"><div class="arab-text">${item.arabcha_matn}</div></div>
                    <div id="uz-${index}" class="tab-panel"><div class="uzb-text">${item.tarjima}</div></div>
                    <div id="iz-${index}" class="tab-panel"><div class="p-4 bg-[var(--ornament)]/5 italic text-sm border-l-2 border-[var(--ornament)]">${item.izoh || "Izoh yo'q."}</div></div>
                </div>`;
            });
            h += `</div><div id="read-view" class="hidden text-lg leading-relaxed text-justify space-y-6">`;
            matnlar.forEach(item => { h += `<p style="text-indent: 2rem;">${item.tarjima}</p>`; });
            document.getElementById('app-container').innerHTML = h + '</div></div>';
            window.scrollTo(0,0);
        }

        function showTab(btn, panelId) {
            const parent = btn.closest('.content-card');
            parent.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            parent.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            parent.querySelector('#' + panelId).classList.add('active');
        }

        function toggleView(m) {
            document.getElementById('study-view').classList.toggle('hidden', m === 'read');
            document.getElementById('read-view').classList.toggle('hidden', m === 'study');
            document.getElementById('btn-study').classList.toggle('active', m === 'study');
            document.getElementById('btn-read').classList.toggle('active', m === 'read');
        }

        function changeFontSize(type, d) {
            const root = document.documentElement;
            const varName = `--${type}-size`;
            let current = parseInt(getComputedStyle(root).getPropertyValue(varName));
            let newVal = Math.max(12, Math.min(70, current + d));
            root.style.setProperty(varName, newVal + "px");
            document.getElementById(type + '-val').innerText = newVal;
        }

        function setTheme(m) {
            document.body.className = m + '-mode';
            document.querySelectorAll('#settings-panel .btn-opt').forEach(b => b.classList.remove('active'));
            document.getElementById('t-'+m).classList.add('active');
        }

        function goBack() {
            if(view==='asarlar') renderOlimlar();
            else if(view==='boblar') selectOlim(state.o);
            else if(view==='matn') loadAsar(state.o, state.a);
        }
    </script>
</body>
</html>
