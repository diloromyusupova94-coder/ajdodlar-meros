<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1a1a1a; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        
        /* Skrinshotdagi chap chiziq uslubi */
        .manuscript-card {
            background: white;
            border-left: 4px solid #b45309; /* Olovrang chiziq */
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        /* 3 ta rejim tugmalari (Tablar) */
        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 1rem 0;
            font-weight: 600;
            font-size: 0.9rem;
            color: #6b7280;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-item.active {
            color: #b45309;
            border-bottom: 2px solid #b45309;
        }

        .scholar-btn { cursor: pointer; padding: 0.5rem 1rem; transition: 0.3s; opacity: 0.5; font-weight: bold; }
        .scholar-btn.active { opacity: 1; color: #b45309; border-bottom: 2px solid #b45309; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-white pt-8 pb-4">
        <div class="max-w-2xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold tracking-tighter text-gray-900 mb-6 uppercase">Avodod</h1>
            <div class="flex justify-center gap-6 text-[12px] uppercase tracking-widest border-b border-gray-100">
                <span class="scholar-btn active" onclick="loadData('xorazmiy', this)">Al-Xorazmiy</span>
                <span class="scholar-btn" onclick="loadData('beruniy', this)">Al-Beruniy</span>
                <span class="scholar-btn" onclick="loadData('ibnsino', this)">Ibn Sino</span>
            </div>
        </div>
    </header>

    <!-- Rejimlar Navigatsiyasi -->
    <div class="nav-tabs">
        <div class="max-w-2xl mx-auto w-full flex">
            <div onclick="switchView('arab')" id="tab-arab" class="tab-item">Arabcha matn</div>
            <div onclick="switchView('tarjima')" id="tab-tarjima" class="tab-item active">Tarjima</div>
            <div onclick="switchView('izoh')" id="tab-izoh" class="tab-item">Izoh</div>
        </div>
    </div>

    <!-- Asosiy Kontent -->
    <main id="app" class="max-w-2xl mx-auto px-4 py-8">
        <!-- Ma'lumotlar shu yerga chiqadi -->
    </main>

    <script>
        let allData = [];
        let viewMode = 'tarjima';

        async function loadData(folder, el) {
            document.querySelectorAll('.scholar-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            try {
                const res = await fetch(`sources/${folder}/al-jabr.json`);
                allData = await res.json();
                render();
            } catch (e) {
                document.getElementById('app').innerHTML = "Fayl topilmadi.";
            }
        }

        function switchView(mode) {
            viewMode = mode;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            render();
        }

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = allData.map((item, i) => {
                let content = "";

                if (viewMode === 'arab') {
                    content = `<p class="font-arab text-4xl text-right leading-loose" dir="rtl">${item.arabcha_matn}</p>`;
                } 
                else if (viewMode === 'tarjima') {
                    content = `
                        <div class="text-[10px] text-gray-400 mb-4 flex justify-between uppercase">
                            <span>Ilmiy asar</span> <span>Kod: ${item.id}</span>
                        </div>
                        <p class="font-arab text-2xl text-right text-gray-400 mb-6" dir="rtl">${item.arabcha_matn}</p>
                        <h4 class="text-[10px] font-bold text-amber-800 uppercase mb-2">Tarjima</h4>
                        <p class="text-xl font-main text-gray-800 mb-6">${item.tarjima}</p>
                        <div class="bg-gray-100 p-4 rounded-xl text-sm text-gray-600 italic">
                            <span class="text-[10px] font-bold block mb-1 uppercase text-amber-700">Izoh</span>
                            ${item.izoh}
                        </div>`;
                } 
                else if (viewMode === 'izoh') {
                    content = `
                        <h4 class="text-[10px] font-bold text-amber-800 uppercase mb-4">Sharh va Izoh</h4>
                        <p class="text-lg text-gray-700 leading-relaxed font-main">${item.izoh || "Ushbu qismga sharh kiritilmagan."}</p>`;
                }

                return `<div class="manuscript-card">${content}</div>`;
            }).join('');
        }

        window.onload = () => loadData('xorazmiy', document.querySelector('.scholar-btn'));
    </script>
</body>
</html>
