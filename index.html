<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Islomiy Meros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Rejimlar uchun ranglar */
        :root { --bg: #ffffff; --text: #111827; --card: #f9fafb; --border: #e5e7eb; --ornament: #059669; }
        .dark-mode { --bg: #121212; --text: #e5e7eb; --card: #1e1e1e; --border: #374151; --ornament: #10b981; }
        .book-mode { --bg: #f4ece0; --text: #433422; --card: #ece2d0; --border: #d4c5a9; --ornament: #854d0e; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; min-height: 100vh; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-serif { font-family: 'Lora', serif; }

        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Naqshinkor hoshiya (Faqat Kitob rejimida chiqadi) */
        .book-frame { display: none; }
        .book-mode .book-frame { 
            display: block; position: fixed; inset: 10px; border: 2px solid var(--ornament); 
            pointer-events: none; z-index: 1000; opacity: 0.3;
            mask-image: radial-gradient(circle, transparent 70%, black 100%);
        }

        .item-card {
            background-color: var(--card); border: 1px solid var(--border);
            padding: 24px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--ornament); }

        /* Pastki Menyu */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 100;
        }
        .mode-tab { flex: 1; text-align: center; padding: 15px 0; font-size: 12px; font-weight: 900; color: #9ca3af; cursor: pointer; }
        .mode-tab.active { color: var(--ornament); border-top: 3px solid var(--ornament); }

        /* Tepada rejim tugmalari */
        .theme-switcher { display: flex; justify-content: center; gap: 8px; padding: 15px; }
        .t-btn { padding: 5px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; border: 1px solid var(--border); }
        .t-btn.active { background: var(--ornament); color: white; border-color: var(--ornament); }
    </style>
</head>
<body>

    <div class="book-frame"></div> <!-- Naqsh hoshiyasi -->

    <!-- Rejimlar paneli -->
    <div class="theme-switcher sticky top-0 bg-[var(--bg)] z-[110]">
        <button onclick="setTheme('day')" id="t-day" class="t-btn active">KUN</button>
        <button onclick="setTheme('book')" id="t-book" class="t-btn text-yellow-800">KITOB</button>
        <button onclick="setTheme('night')" id="t-night" class="t-btn">TUN</button>
    </div>

    <!-- 1. OLIMLAR -->
    <section id="page-scholars" class="page-view active">
        <header class="py-10 text-center">
            <h1 class="text-3xl font-black tracking-widest uppercase italic border-b-2 border-[var(--ornament)] inline-block pb-2">Avodod</h1>
        </header>
        <main class="max-w-xl mx-auto px-6">
            <div class="item-card" onclick="openWorks('xorazmiy', 'Al-Xorazmiy')">📜 Al-Xorazmiy</div>
            <div class="item-card" onclick="openWorks('beruniy', 'Abu Rayhon Beruniy')">📜 Abu Rayhon Beruniy</div>
            <div class="item-card" onclick="openWorks('ibnsino', 'Ibn Sino')">📜 Ibn Sino</div>
        </main>
    </section>

    <!-- 2. ASARLAR -->
    <section id="page-works" class="page-view">
        <header class="p-6 flex items-center border-b border-[var(--border)]">
            <button onclick="showPage('page-scholars')" class="mr-4 text-2xl">←</button>
            <h2 id="scholar-title" class="font-bold text-sm uppercase tracking-widest">Asarlar</h2>
        </header>
        <main id="works-list" class="max-w-xl mx-auto px-6 py-10"></main>
    </section>

    <!-- 3. READER -->
    <section id="page-reader" class="page-view">
        <header class="p-6 flex items-center border-b border-[var(--border)] sticky top-[60px] bg-[var(--bg)] z-50">
            <button onclick="showPage('page-works')" class="mr-4 text-2xl">←</button>
            <h2 id="work-title" class="font-bold text-xs uppercase truncate">Matn</h2>
        </header>
        <main class="max-w-xl mx-auto px-6 py-10 pb-32">
            <div id="win-arab" class="hidden"></div>
            <div id="win-tarjima" class="block"></div>
            <div id="win-izoh" class="hidden"></div>
        </main>
        <nav class="bottom-nav">
            <div onclick="switchMode('arab')" id="tab-arab" class="mode-tab">ARABCHA</div>
            <div onclick="switchMode('tarjima')" id="tab-tarjima" class="mode-tab active">TARJIMA</div>
            <div onclick="switchMode('izoh')" id="tab-izoh" class="mode-tab">IZOH</div>
        </nav>
    </section>

    <script>
        let currentFolder = "";
        let currentData = [];

        function setTheme(mode) {
            document.body.className = mode === 'day' ? '' : mode + '-mode';
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + mode).classList.add('active');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openWorks(folder, name) {
            currentFolder = folder;
            document.getElementById('scholar-title').innerText = name;
            const works = {
                'xorazmiy': [{file:'al-jabr', title:'Al-Jabr va Al-Muqobala'}],
                'beruniy': [{file:'hindiston', title:'Tahqiq ma lil-Hind'}],
                'ibnsino': [{file:'qonun', title:'Al-Qonun fit-tib'}]
            };
            document.getElementById('works-list').innerHTML = (works[folder] || []).map(w => `
                <div class="item-card" onclick="loadContent('${w.file}', '${w.title}')">${w.title}</div>
            `).join('');
            showPage('page-works');
        }

        async function loadContent(file, title) {
            document.getElementById('work-title').innerText = title;
            try {
                const res = await fetch(`sources/${currentFolder}/${file}.json`);
                currentData = await res.json();
                renderContent();
                showPage('page-reader');
                switchMode('tarjima');
            } catch (e) { alert("Fayl topilmadi!"); }
        }

        function switchMode(m) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + m).classList.add('active');
            ['arab', 'tarjima', 'izoh'].forEach(v => {
                document.getElementById('win-' + v).style.display = (v === m ? 'block' : 'none');
            });
            window.scrollTo(0,0);
        }

        function renderContent() {
            document.getElementById('win-arab').innerHTML = currentData.map(d => `<p class="font-arab text-4xl text-right leading-[2.5] mb-10 border-b border-[var(--border)] pb-6">${d.arabcha_matn}</p>`).join('');
            document.getElementById('win-tarjima').innerHTML = currentData.map(d => `<p class="font-serif text-2xl leading-relaxed mb-10 border-b border-[var(--border)] pb-6">${d.tarjima}</p>`).join('');
            document.getElementById('win-izoh').innerHTML = currentData.map(d => `<div class="bg-[var(--card)] p-6 rounded-xl italic mb-6 border-l-4 border-[var(--ornament)]">${d.izoh || 'Izoh yo‘q'}</div>`).join('');
        }
    </script>
</body>
</html>
