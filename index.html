<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Raqamli Ko'prik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        .sepia-mode { background-color: #fcf9f2; color: #433422; }
        .dark-mode { background-color: #121212; color: #e0e0e0; }
        .bridge-card { border-left: 4px solid #b45309; transition: 0.3s; }
        .bridge-card:hover { transform: scale(1.01); background: rgba(180, 83, 9, 0.03); }
    </style>
</head>
<body id="appBody" class="sepia-mode font-main min-h-screen">

    <nav class="border-b border-amber-900/10 p-6 sticky top-0 bg-inherit z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-amber-900 dark:text-amber-500">AVODOD 🏛️</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-60 text-amber-800">Ajdodlar va avlodlar ko‘prigi</p>
            </div>
            <div class="flex gap-4">
                <button onclick="setTheme('sepia')" class="text-xl">☀️</button>
                <button onclick="setTheme('dark')" class="text-xl">🌙</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <div id="content" class="space-y-12 pb-32">
            <div class="text-center py-20 opacity-40 italic text-xl">
                Ilm xazinasi ochilmoqda...
            </div>
        </div>
    </main>

    <script>
        let items = [];

        async function initAvodod() {
            try {
                // sources papkasidan olim faylini o'qiymiz
                const res = await fetch('sources/xorazmiy/al-jabr.json');
                
                if (!res.ok) throw new Error('Fayl topilmadi');

                const data = await res.json();
                items = data.scholars ? data.scholars[0].works[0].items : (data.items || data);
                render(items);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="p-10 text-center bg-red-50 text-red-800 rounded-3xl border border-red-100">
                        <b class="text-xl block">Bog‘lanishda uzilish!</b>
                        <p class="mt-2 text-sm text-center">sources/xorazmiy/al-jabr.json fayli topilmadi yoki ichida xatolik bor.</p>
                    </div>`;
            }
        }

        function render(data) {
            document.getElementById('content').innerHTML = data.map(i => `
                <div class="bridge-card p-8 md:p-12 rounded-r-3xl bg-white/30 shadow-sm border border-black/5">
                    <div class="flex justify-between text-[10px] font-mono opacity-40 mb-8 uppercase tracking-widest">
                        <span>${i.bob || 'Al-jabr va al-muqobala'}</span>
                        <span>ID: ${i.id}</span>
                    </div>

                    <div class="mb-10 text-right">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase">Arabcha matn</h4>
                        <p class="text-4xl md:text-5xl font-arabic leading-[1.8] drop-shadow-sm" dir="rtl">${i.arabcha_matn}</p>
                    </div>

                    <div class="mb-10 pt-6 border-t border-amber-900/5">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase text-left">Tarjima</h4>
                        <p class="text-xl md:text-2xl leading-relaxed italic opacity-90 text-left">"${i.tarjima}"</p>
                    </div>

                    ${i.izoh ? `
                    <div class="p-6 bg-amber-900/5 rounded-2xl border-l-4 border-amber-600/30">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-3 tracking-widest uppercase text-left">Izoh</h4>
                        <p class="text-sm leading-relaxed opacity-80 text-left">${i.izoh}</p>
                    </div>` : ''}
                </div>
            `).join('');
        }

        function setTheme(m) { 
            document.getElementById('appBody').className = m + '-mode font-main min-h-screen transition-all duration-500'; 
        }

        initAvodod();
    </script>
</body>
</html>
