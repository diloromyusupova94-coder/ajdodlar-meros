<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Meros Portali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #111827; --card: #f9fafb; --border: #e5e7eb; --ornament: #059669; }
        .dark-mode { --bg: #121212; --text: #e5e7eb; --card: #1e1e1e; --border: #374151; --ornament: #10b981; }
        .book-mode { --bg: #f4ece0; --text: #433422; --card: #ece2d0; --border: #d4c5a9; --ornament: #854d0e; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; min-height: 100vh; margin: 0; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-serif { font-family: 'Lora', serif; }

        .page-view { display: none; padding-bottom: 100px; }
        .page-view.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            background-color: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 14px; margin-bottom: 12px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--ornament); transform: scale(1.02); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 100;
        }
        .mode-tab { flex: 1; text-align: center; padding: 18px 0; font-size: 11px; font-weight: 900; color: #9ca3af; cursor: pointer; }
        .mode-tab.active { color: var(--ornament); border-top: 3px solid var(--ornament); background: rgba(0,0,0,0.02); }

        .theme-switcher { display: flex; justify-content: center; gap: 8px; padding: 15px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .t-btn { padding: 6px 16px; border-radius: 20px; font-size: 10px; font-weight: bold; border: 1px solid var(--border); cursor: pointer; }
        .t-btn.active { background: var(--ornament); color: white; border-color: var(--ornament); }
        
        .header-sticky { position: sticky; top: 0; background: var(--bg); z-index: 110; }
    </style>
</head>
<body>

    <!-- 1. REJIMLAR (Hamma sahifada tepada turadi) -->
    <div class="header-sticky">
        <div class="theme-switcher">
            <button onclick="setTheme('day')" id="t-day" class="t-btn active">KUN</button>
            <button onclick="setTheme('book')" id="t-book" class="t-btn text-yellow-800">KITOB</button>
            <button onclick="setTheme('night')" id="t-night" class="t-btn">TUN</button>
        </div>
    </div>

    <!-- 2. OLIMLAR SAHIFASI -->
    <section id="page-scholars" class="page-view active">
        <header class="py-12 text-center">
            <h1 class="text-4xl font-black tracking-widest uppercase italic">Avodod</h1>
            <p class="text-[10px] opacity-50 mt-2 tracking-widest uppercase">Ajdodlar Merosi Portali</p>
        </header>
        <main class="max-w-xl mx-auto px-6">
            <div class="item-card" onclick="openWorks('xorazmiy', 'Al-Xorazmiy')"><span>Al-Xorazmiy</span> <span>→</span></div>
            <div class="item-card" onclick="openWorks('beruniy', 'Abu Rayhon Beruniy')"><span>Beruniy</span> <span>→</span></div>
        </main>
    </section>

    <!-- 3. ASARLAR SAHIFASI -->
    <section id="page-works" class="page-view">
        <header class="p-6 flex items-center border-b border-[var(--border)]">
            <button onclick="showPage('page-scholars')" class="mr-4 text-2xl">←</button>
            <h2 id="scholar-title" class="font-bold text-xs uppercase">Asarlar</h2>
        </header>
        <main id="works-list" class="max-w-xl mx-auto px-6 py-8"></main>
    </section>

    <!-- 4. BOBLAR SAHIFASI -->
    <section id="page-chapters" class="page-view">
        <header class="p-6 flex items-center border-b border-[var(--border)]">
            <button onclick="showPage('page-works')" class="mr-4 text-2xl">←</button>
            <h2 id="work-title" class="font-bold text-xs uppercase">Boblar</h2>
        </header>
        <main id="chapters-list" class="max-w-xl mx-auto px-6 py-8"></main>
    </section>

    <!-- 5. READER (ASOSIY MATN) -->
    <section id="page-reader" class="page-view">
        <header class="p-6 flex items-center border-b border-[var(--border)] sticky top-[62px] bg-[var(--bg)] z-50">
            <button onclick="showPage('page-chapters')" class="mr-4 text-2xl">←</button>
            <h2 id="chapter-title" class="font-bold text-xs uppercase truncate">Matn</h2>
        </header>
        
        <main class="max-w-xl mx-auto px-6 py-10">
            <div id="win-arab" class="hidden"></div>
            <div id="win-tarjima" class="block"></div>
            <div id="win-izoh" class="hidden"></div>
        </main>

        <nav class="bottom-nav">
            <div onclick="switchMode('arab')" id="tab-arab" class="mode-tab">ARABCHA</div>
            <div onclick="switchMode('tarjima')" id="tab-tarjima" class="mode-tab active">TARJIMA</div>
            <div onclick="switchMode('izoh')" id="tab-izoh" class="mode-tab">IZOH</div>
        </nav>
    </section>

    <script>
        let currentFolder = "";
        let fullBookData = [];

        // Rangli rejimlar
        function setTheme(mode) {
            document.body.className = mode === 'day' ? '' : mode + '-mode';
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + mode).classList.add('active');
        }

        // Navigatsiya
        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 1-bosqich: Asarlar
        function openWorks(folder, name) {
            currentFolder = folder;
            document.getElementById('scholar-title').innerText = name;
            const works = {
                'xorazmiy': [{file:'al-jabr', title:'Al-Jabr va Al-Muqobala'}],
                'beruniy': [{file:'hindiston', title:'Tahqiq ma lil-Hind'}]
            };
            document.getElementById('works-list').innerHTML = (works[folder] || []).map(w => `
                <div class="item-card" onclick="loadChapters('${w.file}', '${w.title}')"><span>${w.title}</span> <span>→</span></div>
            `).join('');
            showPage('page-works');
        }

        // 2-bosqich: Boblar (JSONni o'qish)
        async function loadChapters(file, title) {
            document.getElementById('work-title').innerText = title;
            try {
                const res = await fetch(`sources/${currentFolder}/${file}.json`);
                fullBookData = await res.json(); 
                
                // Bob nomini JSON'dan olish (bu yerda bob_nomi yoki bo'lmasa index ishlatamiz)
                document.getElementById('chapters-list').innerHTML = fullBookData.map((bob, index) => {
                    const title = bob.bob_nomi || "Muqaddima"; // Agar bitta massiv bo'lsa, "Muqaddima" deb chiqadi
                    return `
                        <div class="item-card" onclick="openReader(${index})">
                            <span>${title}</span> 
                            <span>📖</span>
                        </div>
                    `;
                }).join('');
                
                showPage('page-chapters');
            } catch (e) { 
                // Agar JSON ichida boblar yo'q bo'lsa, to'g'ridan-to'g'ri ko'rsatish mantiqi
                console.error(e);
                alert("Xatolik: JSON strukturasi mos emas!"); 
            }
        }

        // 3-bosqich: Reader (Matnlar)
        function openReader(index) {
            // Siz yuborgan JSON bitta katta massiv bo'lsa:
            const matnlar = Array.isArray(fullBookData[index].matnlar) ? fullBookData[index].matnlar : fullBookData;
            const title = fullBookData[index].bob_nomi || "Matn";
            
            document.getElementById('chapter-title').innerText = title;
            renderContent(matnlar);
            showPage('page-reader');
            switchMode('tarjima');
        }

        // Matnni render qilish (Siz yuborgan kalitlar bo'yicha)
        function renderContent(data) {
            // Arabcha
            document.getElementById('win-arab').innerHTML = data.map(d => `
                <div class="mb-12 border-b border-[var(--border)] pb-8">
                    <p class="font-arab text-4xl text-right leading-[2.6]">${d.arabcha_matn}</p>
                </div>
            `).join('');

            // Tarjima
            document.getElementById('win-tarjima').innerHTML = data.map((d, i) => `
                <div class="mb-12 border-b border-[var(--border)] pb-8">
                    <span class="text-[10px] opacity-40 font-bold uppercase mb-2 block">№ ${d.id || i+1}</span>
                    <p class="font-serif text-2xl leading-relaxed">${d.tarjima}</p>
                </div>
            `).join('');

            // Izoh
            document.getElementById('win-izoh').innerHTML = data.map(d => `
                <div class="bg-[var(--card)] p-6 rounded-xl italic mb-6 border-l-4 border-[var(--ornament)] opacity-90">
                    ${d.izoh || "Ushbu band uchun qo'shimcha izoh kiritilmagan."}
                </div>
            `).join('');
        }

        function switchMode(m) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + m).classList.add('active');
            ['arab', 'tarjima', 'izoh'].forEach(v => {
                document.getElementById('win-' + v).style.display = (v === m ? 'block' : 'none');
            });
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
