<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Meros Portali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        /* 1. RANG TIZIMI VA O'ZGARUVCHILAR */
        :root {
            --bg: #F0F9FF; --text: #075985; --sidebar: #E0F2FE;
            --ornament: #D4AF37; --border: #BAE6FD; --card: #ffffff;
            --arab-size: 48px; --uzb-size: 28px;
        }
        body.book-mode {
            --bg: #FDF8E1; --text: #451A03; --sidebar: #FEF3C7;
            --ornament: #B45309; --border: #FDE68A; --card: #FFFCF0;
        }
        body.night-mode {
            --bg: #020617; --text: #BAE6FD; --sidebar: #0F172A;
            --ornament: #EAB308; --border: #1E293B; --card: #0F172A;
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            transition: background 0.5s, color 0.5s; 
            font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0;
        }
        
        /* 2. NAVIGATION BAR */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: var(--bg); border-bottom: 2px solid var(--ornament);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; backdrop-filter: blur(10px);
        }

        /* 3. MENU VA GRID SYSTEM */
        .selection-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 110px 20px 40px;
        }

        .item-card {
            background: var(--card); border: 2px solid var(--border);
            padding: 40px; border-radius: 20px; cursor: pointer;
            transition: 0.3s; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .item-card:hover { border-color: var(--ornament); transform: translateY(-5px); }
        .item-card h2 { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* 4. READER (MATN) DIZAYNI */
        .content-card {
            background: var(--card); border-radius: 25px;
            padding: 45px; margin-bottom: 40px; border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        .arab-text { 
            font-family: 'Amiri', serif; text-align: right; line-height: 2.2; margin-bottom: 30px; 
            font-size: var(--arab-size); transition: font-size 0.2s;
        }
        .uzb-text { 
            font-family: 'Lora', serif; border-top: 1px dashed var(--border); padding-top: 25px; 
            font-size: var(--uzb-size); transition: font-size 0.2s;
        }
        .izoh-text { font-size: 14px; opacity: 0.6; font-style: italic; margin-top: 15px; display: block; }

        /* 5. BOSHQARUV TUGMALARI */
        .font-control {
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05);
            padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border);
        }
        .theme-btn { padding: 6px 14px; font-size: 10px; font-weight: 900; border: 1px solid var(--ornament); border-radius: 6px; cursor: pointer; }
        .theme-btn.active { background: var(--ornament); color: var(--bg); }
        .size-btn { font-weight: bold; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--ornament); color: white; border-radius: 4px; cursor: pointer; border: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="flex items-center gap-4">
            <button id="back-btn" onclick="goBack()" class="hidden text-2xl">←</button>
            <h1 id="nav-title" class="font-black uppercase tracking-[3px] text-[10px] md:text-xs">Olimlar</h1>
        </div>

        <!-- Shrift boshqaruvi (Matnda paydo bo'ladi) -->
        <div id="font-tools" class="hidden flex gap-3">
            <div class="font-control">
                <span class="text-[10px] font-bold mr-1">ع</span>
                <button onclick="changeFontSize('arab', -4)" class="size-btn">-</button>
                <button onclick="changeFontSize('arab', 4)" class="size-btn">+</button>
            </div>
            <div class="font-control">
                <span class="text-[10px] font-bold mr-1">UZ</span>
                <button onclick="changeFontSize('uzb', -2)" class="size-btn">-</button>
                <button onclick="changeFontSize('uzb', 2)" class="size-btn">+</button>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="setTheme('day')" id="t-day" class="theme-btn active">KUN</button>
            <button onclick="setTheme('book')" id="t-book" class="theme-btn">KITOB</button>
            <button onclick="setTheme('night')" id="t-night" class="theme-btn">TUN</button>
        </div>
    </header>

    <main id="app-container">
        <!-- Dinamik kontent -->
    </main>

    <script>
        let currentState = 'olimlar';
        let selectedOlimData = null;
        let selectedAsarData = null;

        // MA'LUMOTLAR STRUKTURASI
        const database = {
            "xorazmiy": {
                "ism": "Muhammad al-Xorazmiy",
                "asarlar": {
                    "al-jabr": { "nomi": "Al-Jabr va Al-Muqobala", "file": "al-jabr.json" }
                }
            },
            "beruniy": {
                "ism": "Abu Rayhon Beruniy",
                "asarlar": {
                    "hindiston": { "nomi": "Tahqiq ma lil-Hind", "file": "hindiston.json" }
                }
            }
        };

        function init() { renderOlimlar(); }

        // SHRIFT O'LCHAMINI O'ZGARTIRISH
        function changeFontSize(type, delta) {
            const root = document.documentElement;
            const variable = `--${type}-size`;
            const currentSize = parseInt(getComputedStyle(root).getPropertyValue(variable));
            root.style.setProperty(variable, (currentSize + delta) + "px");
        }

        // 1. OLIMLARNI CHIQARISH
        function renderOlimlar() {
            currentState = 'olimlar';
            updateNav("Olimlar", false);
            document.getElementById('font-tools').classList.add('hidden');
            let html = '<div class="selection-grid">';
            for (let key in database) {
                html += `<div class="item-card" onclick="selectOlim('${key}')"><h2 class="text-xl md:text-2xl">${database[key].ism}</h2></div>`;
            }
            html += '</div>';
            document.getElementById('app-container').innerHTML = html;
        }

        // 2. ASARLARNI CHIQARISH
        function selectOlim(key) {
            selectedOlimData = key;
            currentState = 'asarlar';
            updateNav(database[key].ism, true);
            let html = '<div class="selection-grid">';
            const asarlar = database[key].asarlar;
            for (let asarKey in asarlar) {
                html += `<div class="item-card" onclick="selectAsar('${key}', '${asarKey}')"><h2 class="text-lg md:text-xl">${asarlar[asarKey].nomi}</h2></div>`;
            }
            html += '</div>';
            document.getElementById('app-container').innerHTML = html;
        }

        // 3. BOBLARNI CHIQARISH (JSON'dan)
        async function selectAsar(olimKey, asarKey) {
            selectedAsarData = asarKey;
            currentState = 'boblar';
            updateNav(database[olimKey].asarlar[asarKey].nomi, true);
            try {
                const res = await fetch(`sources/${olimKey}/${database[olimKey].asarlar[asarKey].file}`);
                const data = await res.json();
                let html = '<div class="selection-grid">';
                data.forEach((bob, index) => {
                    const matnStr = JSON.stringify(bob.matnlar).replace(/"/g, '&quot;');
                    html += `<div class="item-card" onclick="renderReader(${matnStr}, '${bob.bob_nomi}')"><h2 class="text-md font-bold">${bob.bob_nomi}</h2></div>`;
                });
                html += '</div>';
                document.getElementById('app-container').innerHTML = html;
            } catch (e) { alert("Xatolik: JSON yuklanmadi."); }
        }

        // 4. READER (MATNLARNI CHIQARISH)
        function renderReader(matnlar, bobNomi) {
            currentState = 'matn';
            updateNav(bobNomi, true);
            document.getElementById('font-tools').classList.remove('hidden');
            let html = '<div class="max-w-4xl mx-auto pt-32 px-6 pb-20">';
            matnlar.forEach(d => {
                html += `
                    <div class="content-card">
                        <div class="arab-text">${d.arabcha_matn}</div>
                        <div class="uzb-text">
                            <p>${d.tarjima}</p>
                            ${d.izoh ? `<span class="izoh-text">Izoh: ${d.izoh}</span>` : ''}
                        </div>
                        <div class="text-[8px] opacity-5 text-right mt-4 italic">${d.id}</div>
                    </div>`;
            });
            html += '</div>';
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        // NAVIGATSIYA
        function updateNav(title, showBack) {
            document.getElementById('nav-title').innerText = title;
            document.getElementById('back-btn').style.display = showBack ? 'block' : 'none';
        }

        function goBack() {
            if (currentState === 'matn') selectOlim(selectedOlimData);
            else if (currentState === 'boblar') selectOlim(selectedOlimData);
            else if (currentState === 'asarlar') renderOlimlar();
        }

        function setTheme(mode) {
            document.body.className = mode + '-mode';
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + mode).classList.add('active');
        }

        init();
    </script>
</body>
</html>
