<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Raqamli ko‘prik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b45309; --paper: #fcf9f2; --ink: #1a1c2c; }
        .font-arabic { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        .font-brand { font-family: 'Montserrat', sans-serif; }
        
        body { background: var(--paper); color: var(--ink); scroll-behavior: smooth; }
        
        /* Muzey effekti: Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(180, 83, 9, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: "AVODOD";
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 4rem;
            opacity: 0.03;
            letter-spacing: 1rem;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.7);
        }

        .bridge-line {
            width: 4px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
        }

        .search-glow:focus {
            box-shadow: 0 0 20px rgba(180, 83, 9, 0.2);
            border-color: var(--gold);
        }

        .sepia-overlay {
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            pointer-events: none;
            position: fixed;
            inset: 0;
            opacity: 0.4;
            z-index: 100;
        }
    </style>
</head>
<body class="font-main">
    <div class="sepia-overlay"></div>

    <!-- Navigatsiya -->
    <nav class="sticky top-0 z-[110] bg-white/60 backdrop-blur-md border-b border-amber-900/10 p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-brand text-4xl font-black tracking-tighter text-amber-900">AVODOD 🏛️</h1>
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-60 font-bold">Ajdodlar va avlodlar ko‘prigi</p>
            </div>
            <div class="hidden md:block italic opacity-40 text-sm">
                Muallif: Dilorom Yusupova
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-16 relative z-[105]">
        <!-- Qidiruv paneli -->
        <div class="mb-20">
            <input type="text" id="search" placeholder="Xazinadan qidirish..." 
                   class="w-full p-6 rounded-full bg-white/80 border-2 border-amber-600/10 outline-none search-glow transition-all text-xl font-light">
        </div>

        <!-- Kontent maydoni -->
        <div id="content" class="space-y-24">
            <div class="text-center py-20 opacity-40 italic text-2xl font-brand tracking-widest animate-pulse">
                Ilm xazinasi ochilmoqda...
            </div>
        </div>
    </main>

    <script>
        let items = [];

        async function initAvodod() {
            try {
                const res = await fetch('sources/xorazmiy/al-jabr.json');
                if (!res.ok) throw new Error('Fayl topilmadi');
                const data = await res.json();
                items = data.scholars ? data.scholars[0].works[0].items : (data.items || data);
                render(items);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="glass-card p-12 text-center rounded-[3rem]">
                        <h2 class="text-2xl font-brand font-black text-red-800 mb-4">Bog‘lanishda uzilish</h2>
                        <p class="opacity-70">Sizning sources/xorazmiy/al-jabr.json faylingiz yuklanmadi.</p>
                    </div>`;
            }
        }

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = data.map(i => `
                <div class="glass-card p-10 md:p-16 rounded-[4rem]">
                    <div class="bridge-line"></div>
                    
                    <div class="flex justify-between items-center mb-12 opacity-30 font-brand text-[10px] tracking-[0.5em] uppercase">
                        <span>${i.bob || 'Al-jabr va al-muqobala'}</span>
                        <span>ID: ${i.id}</span>
                    </div>

                    <!-- I. Arabcha matn -->
                    <div class="mb-14">
                        <h4 class="text-[11px] font-brand font-bold text-amber-800 mb-6 tracking-widest uppercase opacity-60">Arabcha matn</h4>
                        <p class="text-5xl md:text-6xl font-arabic text-right leading-[1.8] text-amber-950" dir="rtl">
                            ${i.arabcha_matn}
                        </p>
                    </div>

                    <!-- II. Tarjima -->
                    <div class="mb-14 pt-10 border-t border-amber-900/5">
                        <h4 class="text-[11px] font-brand font-bold text-amber-800 mb-6 tracking-widest uppercase opacity-60">Tarjima</h4>
                        <p class="text-2xl md:text-3xl leading-relaxed italic text-gray-800 font-main">
                            "${i.tarjima}"
                        </p>
                    </div>

                    <!-- III. Izoh -->
                    ${i.izoh ? `
                    <div class="p-8 md:p-12 bg-amber-900/5 rounded-[3rem] border border-amber-900/10">
                        <h4 class="text-[11px] font-brand font-bold text-amber-800 mb-4 tracking-widest uppercase opacity-60">Izoh</h4>
                        <p class="text-lg opacity-90 leading-relaxed text-gray-700">
                            ${i.izoh}
                        </p>
                    </div>` : ''}
                </div>
            `).join('');
        }

        // Qidiruv mantiqi
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = items.filter(i => 
                i.arabcha_matn.includes(val) || 
                i.tarjima.toLowerCase().includes(val) ||
                (i.izoh && i.izoh.toLowerCase().includes(val))
            );
            render(filtered);
        });

        initAvodod();
    </script>
</body>
</html>
