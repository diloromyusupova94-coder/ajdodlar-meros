<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Raqamli Ko'prik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        .sepia-mode { background-color: #fcf9f2; color: #433422; }
        .dark-mode { background-color: #121212; color: #e0e0e0; }
        .bridge-card { transition: 0.4s ease; border-left: 4px solid #b45309; }
        .bridge-card:hover { transform: translateX(10px); background: rgba(180, 83, 9, 0.05); }
    </style>
</head>
<body id="appBody" class="sepia-mode font-main min-h-screen">

    <nav class="border-b border-amber-900/10 p-6 sticky top-0 bg-inherit z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-amber-900 dark:text-amber-500">AVODOD 🏛️</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-60">Ajdodlar va Avlodlar Ko'prigi</p>
            </div>
            <div class="flex gap-4">
                <button onclick="setTheme('sepia')" class="text-xl">☀️</button>
                <button onclick="setTheme('dark')" class="text-xl">🌙</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <!-- Qidiruv paneli -->
        <div class="mb-12">
            <input type="text" id="search" placeholder="Al-Asl yoki At-Tarjimadan qidirish..." 
                   class="w-full p-5 rounded-2xl bg-white/50 border-2 border-amber-600/10 focus:border-amber-600 outline-none transition shadow-sm">
        </div>

        <div id="content" class="space-y-16">
            <div class="text-center py-20 opacity-40 italic font-serif text-xl">
                Ilm zanjiri ulanmoqda...
            </div>
        </div>
    </main>

    <script>
        let items = [];
        const clean = (t) => t.replace(/[\u064B-\u0652]/g, "").toLowerCase();

        async function initAvodod() {
            try {
                // DIQQAT: Fayl yo'li sening strukturangga ko'ra mana bunday bo'lishi kerak:
                const res = await fetch('./sources/xorazmiy/al-jabr.json');
                const data = await res.json();
                
                // Agar json scholars strukturasi bilan bo'lsa
                items = data.scholars ? data.scholars[0].works[0].items : (data.items || data);
                render(items);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="p-10 text-center bg-red-50 text-red-800 rounded-3xl border border-red-100">
                        <b class="text-xl">Bog'lanishda uzilish!</b><br>
                        <p class="mt-2">./sources/xorazmiy/al-jabr.json fayli topilmadi yoki ichida xatolik bor.</p>
                    </div>`;
            }
        }

        function render(data) {
            document.getElementById('content').innerHTML = data.map(i => `
                <div class="bridge-card p-8 md:p-12 rounded-r-3xl bg-white/20 shadow-sm">
                    <div class="flex justify-between text-[10px] font-mono opacity-40 mb-8 uppercase tracking-widest">
                        <span>${i.bob || 'Xorazmiy: Al-Jabr'}</span>
                        <span>ID: ${i.id}</span>
                    </div>

                    <!-- 1. Al-Asl (Original) -->
                    <div class="mb-10">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase">I. Al-Asl</h4>
                        <p class="text-4xl md:text-5xl font-arabic text-right leading-[1.8]" dir="rtl">${i.arabcha_matn}</p>
                    </div>

                    <!-- 2. At-Tarjima (Akademik) -->
                    <div class="mb-10 pt-6 border-t border-amber-900/5">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase">II. At-Tarjima</h4>
                        <p class="text-xl md:text-2xl leading-relaxed italic opacity-90">"${i.tarjima}"</p>
                    </div>

                    <!-- 3. Al-Mantiq (Izoh) -->
                    ${i.izoh ? `
                    <div class="p-6 bg-amber-900/5 rounded-2xl border-l-4 border-amber-600/30">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-3 tracking-widest uppercase">III. Al-Mantiq</h4>
                        <p class="text-sm leading-relaxed opacity-80">${i.izoh}</p>
                    </div>` : ''}
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const q = clean(e.target.value);
            const filtered = items.filter(i => clean(i.arabcha_matn).includes(q) || i.tarjima.toLowerCase().includes(q));
            render(filtered);
        });

        function setTheme(m) { document.getElementById('appBody').className = m + '-mode font-main min-h-screen transition-all duration-500'; }

        initAvodod();
    </script>
</body>
</html>
