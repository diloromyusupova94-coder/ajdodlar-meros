<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Meros Portali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #FDF8E1; --text: #451A03; --ornament: #B45309; --border: #FDE68A; --card: #FFFCF0; 
            --arab-size: 38px; --uzb-size: 20px; 
        }
        body.day-mode { --bg: #F0F9FF; --text: #075985; --ornament: #0284C7; --border: #BAE6FD; --card: #ffffff; }
        body.night-mode { --bg: #020617; --text: #BAE6FD; --ornament: #EAB308; --border: #1E293B; --card: #0F172A; }

        body { 
            background-color: var(--bg); color: var(--text); transition: 0.3s; 
            font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden;
        }
        
        /* HEADER */
        .top-nav { 
            position: fixed; top: 0; left: 0; right: 0; height: 85px; 
            background: var(--bg); border-bottom: 3px solid var(--ornament); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logo-text { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; line-height: 1; }

        /* SETTINGS PANEL */
        #settings-panel {
            position: fixed; top: 0; right: -320px; width: 310px; height: 100%;
            background: var(--card); border-left: 5px solid var(--ornament);
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px; box-shadow: -15px 0 40px rgba(0,0,0,0.15);
        }
        #settings-panel.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        /* CONTENT */
        .selection-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 125px 20px 40px; max-width: 1200px; margin: 0 auto;
        }
        .item-card { 
            background: var(--card); border: 2px solid var(--border); padding: 35px; 
            border-radius: 20px; cursor: pointer; text-align: center; 
            transition: 0.3s; 
        }
        .item-card:hover { border-color: var(--ornament); transform: translateY(-5px); }
        
        .content-card { 
            background: var(--card); border-radius: 25px; padding: 35px; 
            margin-bottom: 30px; border: 1.5px solid var(--border); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .arab-text { font-family: 'Amiri', serif; text-align: right; line-height: 1.8; font-size: var(--arab-size); margin-bottom: 25px; }
        .uzb-text { 
            font-family: 'Lora', serif; border-top: 2px solid var(--border); 
            padding-top: 25px; font-size: var(--uzb-size); color: var(--text);
            display: block !important; opacity: 1 !important;
        }

        /* SETTINGS UI */
        .setting-item { margin-bottom: 30px; }
        .setting-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; opacity: 0.7; }
        .btn-group { display: flex; gap: 8px; }
        .btn-opt { flex: 1; padding: 12px; border: 1.5px solid var(--ornament); border-radius: 10px; font-size: 10px; font-weight: 900; background: transparent; color: var(--text); }
        .btn-opt.active { background: var(--ornament); color: white; }
        .size-ctrl { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 12px; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--ornament); color: white; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .hidden { display: none !important; }
    </style>
</head>
<body onload="init()">

    <!-- HEADER -->
    <header class="top-nav">
        <div class="flex items-center gap-4">
            <button id="back-btn" onclick="goBack()" class="hidden p-2 text-2xl font-black">←</button>
            <div class="flex items-center gap-3">
                <!-- LOGO - SAKKIZ BURCHAKLI TO'G'RI SHAKL -->
                <div class="w-16 h-16 flex items-center justify-center">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Sakkiz qirrali naqsh chiziqlari -->
                        <path d="M50 5 L64 36 L95 50 L64 64 L50 95 L36 64 L5 50 L36 36 Z" 
                              fill="none" stroke="var(--ornament)" stroke-width="3" stroke-linejoin="round"/>
                        <!-- Markazdagi kitob -->
                        <g transform="translate(30, 42)" fill="var(--ornament)">
                            <path d="M2 2 C10 -2 18 2 20 4 V18 C18 16 10 12 2 16 Z"/>
                            <path d="M20 4 C22 2 30 -2 38 2 V16 C30 12 22 16 20 18 Z"/>
                            <rect x="19" y="4" width="2" height="15" fill="var(--bg)"/>
                        </g>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="logo-text">AVODOD</span>
                    <span class="text-[9px] font-black opacity-60 tracking-[0.2em] uppercase">Meros Portali</span>
                </div>
            </div>
        </div>
        
        <button onclick="toggleSettings(true)" class="p-2 text-[var(--ornament)]">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>

    <!-- SETTINGS PANEL -->
    <div id="overlay" class="overlay" onclick="toggleSettings(false)"></div>
    <aside id="settings-panel">
        <div class="flex justify-between items-center mb-10">
            <h3 class="font-black text-xl">SOZLAMALAR</h3>
            <button onclick="toggleSettings(false)" class="text-3xl">&times;</button>
        </div>
        <!-- Izlash faqat o'qish rejimida ko'rinadi -->
        <div class="setting-item hidden" id="search-container">
            <span class="setting-label">Matndan izlash</span>
            <input type="text" id="search-input" onkeyup="liveSearch()" placeholder="So'z yozing..." class="w-full p-4 rounded-xl border-2 border-[var(--ornament)] bg-transparent outline-none font-bold text-sm">
        </div>
        <div class="setting-item">
            <span class="setting-label">Ranglar mavzusi</span>
            <div class="btn-group">
                <button onclick="setTheme('day')" id="t-day" class="btn-opt">KUN</button>
                <button onclick="setTheme('book')" id="t-book" class="btn-opt active">KITOB</button>
                <button onclick="setTheme('night')" id="t-night" class="btn-opt">TUN</button>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">Arabcha matn: <span id="arab-val">38</span>px</span>
            <div class="size-ctrl">
                <button onclick="changeFontSize('arab', -2)" class="circle-btn">－</button>
                <button onclick="changeFontSize('arab', 2)" class="circle-btn">＋</button>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">Izoh hajmi: <span id="uzb-val">20</span>px</span>
            <div class="size-ctrl">
                <button onclick="changeFontSize('uzb', -2)" class="circle-btn">－</button>
                <button onclick="changeFontSize('uzb', 2)" class="circle-btn">＋</button>
            </div>
        </div>
    </aside>

    <main id="app-container"></main>

    <script>
        let currentView = 'olimlar';
        let currentOlim = null;
        let currentAsar = null;

        const database = {
            "xorazmiy": { "ism": "Muhammad al-Xorazmiy", "asarlar": { "al-jabr": { "nomi": "Al-Jabr va Al-Muqobala", "file": "al-jabr.json" } } },
            "beruniy": { "ism": "Abu Rayhon Beruniy", "asarlar": { "hindiston": { "nomi": "Tahqiq ma lil-Hind", "file": "hindiston.json" } } }
        };

        function init() { renderOlimlar(); }

        function toggleSettings(open) {
            document.getElementById('settings-panel').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('active', open);
        }

        function renderOlimlar() {
            currentView = 'olimlar';
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('search-container').classList.add('hidden');
            let html = '<div class="selection-grid">';
            for (let key in database) {
                html += `<div class="item-card" onclick="selectOlim('${key}')"><h2 class="text-xl font-bold">${database[key].ism}</h2><p class="text-[10px] mt-2 opacity-50 uppercase tracking-widest">Olim haqida</p></div>`;
            }
            document.getElementById('app-container').innerHTML = html + '</div>';
        }

        function selectOlim(key) {
            currentOlim = key;
            currentView = 'asarlar';
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('search-container').classList.add('hidden');
            let html = '<div class="selection-grid">';
            for (let asarKey in database[key].asarlar) {
                html += `<div class="item-card" onclick="selectAsar('${key}', '${asarKey}')"><h2 class="text-lg font-bold">${database[key].asarlar[asarKey].nomi}</h2></div>`;
            }
            document.getElementById('app-container').innerHTML = html + '</div>';
        }

        async function selectAsar(olimKey, asarKey) {
            currentAsar = asarKey;
            currentView = 'boblar';
            try {
                const res = await fetch(`sources/${olimKey}/${database[olimKey].asarlar[asarKey].file}`);
                const data = await res.json();
                let html = '<div class="selection-grid">';
                data.forEach((bob, index) => {
                    const matnlarStr = encodeURIComponent(JSON.stringify(bob.matnlar));
                    html += `<div class="item-card" onclick="renderReader('${matnlarStr}')"><h2 class="font-bold">${bob.bob_nomi}</h2></div>`;
                });
                document.getElementById('app-container').innerHTML = html + '</div>';
            } catch(e) { alert("JSON fayl topilmadi!"); }
        }

        function renderReader(matnlarStr) {
            currentView = 'matn';
            const matnlar = JSON.parse(decodeURIComponent(matnlarStr));
            document.getElementById('search-container').classList.remove('hidden');
            let html = '<div class="max-w-4xl mx-auto pt-32 px-5 pb-24">';
            matnlar.forEach(d => {
                html += `<div class="content-card">
                            <div class="arab-text">${d.arabcha_matn}</div>
                            <div class="uzb-text">${d.tarjima}</div>
                         </div>`;
            });
            document.getElementById('app-container').innerHTML = html + '</div>';
            window.scrollTo(0,0);
        }

        function goBack() {
            if (currentView === 'asarlar') renderOlimlar();
            else if (currentView === 'boblar') selectOlim(currentOlim);
            else if (currentView === 'matn') selectAsar(currentOlim, currentAsar);
        }

        function liveSearch() {
            let input = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.content-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
            });
        }

        function changeFontSize(type, delta) {
            const root = document.documentElement;
            const variable = `--${type}-size`;
            const currentSize = parseInt(getComputedStyle(root).getPropertyValue(variable));
            const newSize = Math.max(12, Math.min(80, currentSize + delta));
            root.style.setProperty(variable, newSize + "px");
            document.getElementById(`${type}-val`).innerText = newSize;
        }

        function setTheme(mode) {
            document.body.className = mode + '-mode';
            document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + mode).classList.add('active');
        }
    </script>
</body>
</html>
