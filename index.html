<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Raqamli Meros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111827; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-serif { font-family: 'Lora', serif; }

        /* Oynalar boshqaruvi */
        .page-view { display: none; min-height: 100vh; background: white; }
        .page-view.active { display: block; }

        /* 3ta rejim (Reader) ichidagi oynalar */
        .reader-window { display: none; animation: fadeIn 0.3s ease; }
        .reader-window.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Listlar dizayni */
        .list-item {
            background: #f9fafb;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #f1f1f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:hover { border-color: #059669; background: #f0fdf4; }

        /* Pastki 3talik menyu */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid #eee; display: flex; z-index: 100; 
        }
        .mode-tab {
            flex: 1; text-align: center; padding: 18px 0; font-size: 13px; 
            font-weight: 700; color: #9ca3af; cursor: pointer; transition: 0.3s;
        }
        .mode-tab.active { color: #059669; border-top: 3px solid #059669; background: white; }
    </style>
</head>
<body>

    <!-- 1. OLIMLAR SAHIFASI -->
    <section id="page-scholars" class="page-view active">
        <header class="p-10 text-center">
            <h1 class="text-4xl font-black tracking-tighter uppercase mb-2">Avodod</h1>
            <p class="text-gray-400 text-[10px] tracking-[0.3em] uppercase">Ilmiy meros portali</p>
        </header>
        <main class="max-w-xl mx-auto px-6">
            <div class="list-item" onclick="openWorks('xorazmiy', 'Al-Xorazmiy')">
                <span class="font-bold">Al-Xorazmiy</span>
                <span class="text-gray-300">→</span>
            </div>
            <div class="list-item" onclick="openWorks('beruniy', 'Abu Rayhon Beruniy')">
                <span class="font-bold">Abu Rayhon Beruniy</span>
                <span class="text-gray-300">→</span>
            </div>
            <div class="list-item" onclick="openWorks('ibnsino', 'Ibn Sino')">
                <span class="font-bold">Ibn Sino</span>
                <span class="text-gray-300">→</span>
            </div>
        </main>
    </section>

    <!-- 2. ASARLAR SAHIFASI -->
    <section id="page-works" class="page-view">
        <header class="p-6 border-b flex items-center sticky top-0 bg-white">
            <button onclick="showPage('page-scholars')" class="p-2 mr-2 text-xl">←</button>
            <h2 id="current-scholar-name" class="font-extrabold uppercase text-xs tracking-widest">Asarlar</h2>
        </header>
        <main id="works-list" class="max-w-xl mx-auto px-6 py-8">
            <!-- Asarlar ro'yxati -->
        </main>
    </section>

    <!-- 3. O'QISH SAHIFASI (3ta rejim shu yerda) -->
    <section id="page-reader" class="page-view">
        <header class="p-6 border-b flex items-center sticky top-0 bg-white z-10">
            <button onclick="showPage('page-works')" class="p-2 mr-2 text-xl">←</button>
            <h2 id="current-work-name" class="font-extrabold uppercase text-xs tracking-widest truncate">Matn</h2>
        </header>
        
        <main class="max-w-xl mx-auto px-6 pt-6 pb-32">
            <!-- ALOHIDA OYNALAR (REJIMLAR) -->
            <div id="win-arab" class="reader-window"></div>
            <div id="win-tarjima" class="reader-window active"></div>
            <div id="win-izoh" class="reader-window"></div>
        </main>

        <!-- Pastki menyu faqat shu sahifada ishlaydi -->
        <nav class="bottom-nav">
            <div onclick="switchMode('arab')" id="tab-arab" class="mode-tab">Arabcha</div>
            <div onclick="switchMode('tarjima')" id="tab-tarjima" class="mode-tab active">Tarjima</div>
            <div onclick="switchMode('izoh')" id="tab-izoh" class="mode-tab">Izoh</div>
        </nav>
    </section>

    <script>
        let currentFolder = "";
        let currentItems = [];

        // Asosiy sahifalarni almashtirish (Olimlar / Asarlar / Reader)
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Olim tanlanganda asarlarini yuklash
        function openWorks(folder, name) {
            currentFolder = folder;
            document.getElementById('current-scholar-name').innerText = name;
            
            const library = {
                'xorazmiy': [{ file: 'al-jabr', title: 'Al-Jabr va Al-Muqobala' }],
                'beruniy': [{ file: 'hindiston', title: 'Tahqiq ma lil-Hind' }],
                'ibnsino': [{ file: 'qonun', title: 'Al-Qonun fit-tib' }]
            };

            const container = document.getElementById('works-list');
            container.innerHTML = library[folder].map(w => `
                <div class="list-item" onclick="loadContent('${w.file}', '${w.title}')">
                    <span class="font-semibold">${w.title}</span>
                    <span class="text-gray-300">→</span>
                </div>
            `).join('');

            showPage('page-works');
        }

        // Asar matnini JSONdan yuklash
        async function loadContent(file, title) {
            document.getElementById('current-work-name').innerText = title;
            try {
                const res = await fetch(`sources/${currentFolder}/${file}.json`);
                currentItems = await res.json();
                
                renderReader(); // Matnlarni chizish
                showPage('page-reader'); // Reader sahifasini ochish
                switchMode('tarjima'); // Har doim tarjimadan boshlash
            } catch (e) {
                alert("JSON fayl topilmadi!");
            }
        }

        // 3ta rejimni (Arab/Tarjima/Izoh) almashtirish funksiyasi
        function switchMode(mode) {
            // 1. Tugmalarni aktiv qilish
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');

            // 2. Oynalarni almashtirish
            document.querySelectorAll('.reader-window').forEach(w => w.classList.remove('active'));
            document.getElementById('win-' + mode).classList.add('active');

            window.scrollTo(0,0);
        }

        // Matnlarni oynalarga (rejimlar bo'yicha) joylashtirish
        function renderReader() {
            const arabWin = document.getElementById('win-arab');
            const tarjWin = document.getElementById('win-tarjima');
            const izohWin = document.getElementById('win-izoh');

            // Arabcha oyna
            arabWin.innerHTML = currentItems.map((item, i) => `
                <div class="py-10 border-b text-right font-arab text-4xl leading-[2.2] text-gray-900">
                    ${item.arabcha_matn} 
                    <span class="text-xs font-sans opacity-20 border px-2 rounded-full inline-block mr-2">${i+1}</span>
                </div>
            `).join('');

            // Tarjima oyna
            tarjWin.innerHTML = currentItems.map((item, i) => `
                <div class="py-10 border-b">
                    <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest block mb-4">${i+1}-Xatboshi</span>
                    <p class="text-2xl font-serif leading-relaxed text-gray-800">${item.tarjima}</p>
                </div>
            `).join('');

            // Izoh oyna
            izohWin.innerHTML = currentItems.map((item, i) => `
                <div class="py-10 border-b">
                    <div class="bg-gray-50 p-8 rounded-3xl border-l-4 border-green-600">
                        <span class="text-xs font-bold text-green-700 uppercase block mb-3">Ilmiy izoh ${i+1}</span>
                        <p class="text-lg font-serif italic text-gray-600 leading-relaxed">${item.izoh || "Izoh kiritilmagan."}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
