<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Ajdodlar va Avlodlar Ko'prigi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; scroll-behavior: smooth; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        
        /* Bo'lim tugmalari (Tablar) */
        .view-btn {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-weight: 600;
            font-size: 15px;
            color: #6b7280;
            border-bottom: 2px solid #f3f4f6;
            transition: all 0.3s ease;
        }
        .view-btn.active {
            color: #b45309; /* Jigarrang-to'q sariq (Ajdodlar uslubi) */
            border-bottom: 2px solid #b45309;
        }

        /* Olimlar ro'yxati */
        .scholar-tab { cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .scholar-tab.active { border-color: #1f2937; color: #1f2937; }
        
        .sticky-nav { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); z-index: 50; }
        .ayah-card { transition: opacity 0.4s ease; }
    </style>
</head>
<body class="font-main">

    <!-- Header: Logo va Olimlar -->
    <header class="border-b border-gray-100 bg-white">
        <div class="max-w-2xl mx-auto px-4 py-8 text-center">
            <h1 class="text-3xl font-bold tracking-[0.2em] text-gray-900 mb-8 uppercase">Avodod</h1>
            <div class="flex justify-around text-[11px] font-bold uppercase tracking-widest text-gray-400">
                <span class="scholar-tab active" onclick="loadData('xorazmiy', this)">Al-Xorazmiy</span>
                <span class="scholar-tab" onclick="loadData('beruniy', this)">Al-Beruniy</span>
                <span class="scholar-tab" onclick="loadData('ibnsino', this)">Ibn Sino</span>
            </div>
        </div>
    </header>

    <!-- Navigatsiya: Arabcha, Tarjima, Izoh -->
    <nav class="sticky-nav border-b border-gray-100 shadow-sm">
        <div class="max-w-2xl mx-auto flex">
            <button onclick="switchView('arab')" id="btn-arab" class="view-btn">Arabcha matn</button>
            <button onclick="switchView('tarjima')" id="btn-tarjima" class="view-btn active">Tarjima</button>
            <button onclick="switchView('izoh')" id="btn-izoh" class="view-btn">Izoh</button>
        </div>
    </nav>

    <!-- Asosiy matn maydoni -->
    <main id="app" class="max-w-2xl mx-auto px-6 py-10">
        <div class="flex justify-center py-20">
            <div class="animate-pulse text-gray-300">Yuklanmoqda...</div>
        </div>
    </main>

    <script>
        let contentData = []; 
        let currentMode = 'tarjima';

        // Ma'lumotni JSON dan olish
        async function loadData(folder, el) {
            // Aktiv olimni belgilash
            document.querySelectorAll('.scholar-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            try {
                const response = await fetch(`sources/${folder}/al-jabr.json`);
                if (!response.ok) throw new Error();
                contentData = await response.json();
                renderContent();
            } catch (err) {
                document.getElementById('app').innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <p>Ma'lumot topilmadi yoki fayl yo'li xato.</p>
                        <p class="text-[10px] mt-2 italic">sources/${folder}/al-jabr.json</p>
                    </div>`;
            }
        }

        // Ko'rinish rejimini almashtirish
        function switchView(mode) {
            currentMode = mode;
            
            // Tugmalar rangini yangilash
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            
            renderContent();
        }

        // Matnni shakllantirish
        function renderContent() {
            const container = document.getElementById('app');
            if (contentData.length === 0) return;

            container.innerHTML = contentData.map((item, index) => {
                let segment = "";

                if (currentMode === 'arab') {
                    // FAQAT ARABCHA MATN REJIMIDAGI KO'RINISh
                    segment = `<p class="font-arab text-4xl text-right leading-[2.5] text-gray-800" dir="rtl">${item.arabcha_matn} <span class="text-xs font-sans opacity-20 border border-gray-300 rounded-full px-2 py-1 ml-2 inline-block">${index + 1}</span></p>`;
                } 
                else if (currentMode === 'tarjima') {
                    // ARABCHA + TARJIMA REJIMIDAGI KO'RINISh
                    segment = `
                        <p class="font-arab text-2xl text-right opacity-30 mb-6" dir="rtl">${item.arabcha_matn}</p>
                        <div class="flex gap-4">
                            <span class="text-amber-700 font-bold text-lg">${index + 1}.</span>
                            <p class="text-xl leading-relaxed text-gray-900">${item.tarjima}</p>
                        </div>`;
                } 
                else if (currentMode === 'izoh') {
                    // FAQAT IZOH REJIMIDAGI KO'RINISh
                    segment = `
                        <div class="border-l-2 border-gray-200 pl-6 py-2">
                            <span class="text-[10px] uppercase tracking-widest text-gray-400 block mb-3">Tushuntirish ${index + 1}</span>
                            <p class="text-gray-600 text-lg leading-relaxed italic font-light">${item.izoh || "Ushbu qismga izoh berilmagan."}</p>
                        </div>`;
                }

                return `<div class="ayah-card mb-16 animate-in fade-in duration-500">${segment}</div>`;
            }).join('');

            window.scrollTo({top: 0});
        }

        // Sahifa yuklanganda birinchi olimni yuklash
        window.onload = () => {
            loadData('xorazmiy', document.querySelector('.scholar-tab'));
        };
    </script>
</body>
</html>
