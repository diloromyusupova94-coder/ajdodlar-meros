<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Ajdodlar va avlodlar ko‘prigi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --card: #f8f9fa; --accent: #b45309; }
        
        /* Rejimlar */
        .day-mode { --bg: #ffffff; --text: #1a1a1a; --card: #f3f4f6; --accent: #b45309; }
        .night-mode { --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --accent: #fbbf24; }
        .book-mode { --bg: #f4ecd8; --text: #5d4037; --card: #e8dfc4; --accent: #8d6e63; }

        body { background-color: var(--bg); color: var(--text); transition: all 0.5s ease; }
        .font-arabic { font-family: 'Amiri', serif; }
        .font-main { font-family: 'Lora', serif; }
        .font-title { font-family: 'Playfair Display', serif; }

        /* Professional "Kitob varaqlari" effekti */
        .manuscript-card {
            background-color: var(--card);
            border-left: 6px solid var(--accent);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .manuscript-card:hover { transform: scale(1.01); }

        .mode-btn { 
            padding: 8px 15px; 
            border-radius: 20px; 
            border: 1px solid var(--accent); 
            font-size: 12px;
            transition: 0.3s;
        }
        .mode-btn:hover { background: var(--accent); color: white; }
    </style>
</head>
<body class="day-mode font-main min-h-screen">

    <!-- Navigatsiya va Rejimlar paneli -->
    <nav class="sticky top-0 z-50 bg-inherit border-b border-black/5 p-4 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="font-title text-4xl font-black text-amber-900 tracking-tight">AVODOD 🏛️</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] opacity-70">Ajdodlar va avlodlar ko‘prigi</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="changeMode('day')" class="mode-btn">Kun</button>
                <button onclick="changeMode('book')" class="mode-btn">Kitob</button>
                <button onclick="changeMode('night')" class="mode-btn">Tun</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <!-- Qidiruv -->
        <div class="mb-16">
            <input type="text" id="search" placeholder="Xazinadan qidirish..." 
                   class="w-full p-5 rounded-2xl bg-white/10 border-2 border-amber-600/20 focus:border-amber-600 outline-none transition shadow-inner">
        </div>

        <!-- Ma'lumotlar -->
        <div id="content" class="space-y-20">
            <div class="text-center py-20 opacity-40 italic">Xazina ochilmoqda...</div>
        </div>
    </main>

    <script>
        let items = [];

        async function init() {
            try {
                const res = await fetch('sources/xorazmiy/al-jabr.json');
                const data = await res.json();
                items = data.scholars ? data.scholars[0].works[0].items : (data.items || data);
                render(items);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                <div class="p-10 manuscript-card rounded-3xl text-center">
                    <h2 class="text-2xl font-title mb-4">Bog‘lanishda uzilish</h2>
                    <p>JSON fayli topilmadi yoki yo‘l noto‘g‘ri.</p>
                </div>`;
            }
        }

        function render(data) {
            document.getElementById('content').innerHTML = data.map(i => `
                <article class="manuscript-card p-8 md:p-14 rounded-[2rem] relative overflow-hidden">
                    <div class="flex justify-between items-center mb-10 opacity-40 font-mono text-[10px] uppercase">
                        <span>${i.bob || 'Ilmiy meros'}</span>
                        <span>Kod: ${i.id}</span>
                    </div>

                    <!-- Arabcha matn -->
                    <div class="mb-12">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase">Arabcha matn</h4>
                        <p class="text-4xl md:text-5xl font-arabic text-right leading-[1.8]" dir="rtl">${i.arabcha_matn}</p>
                    </div>

                    <!-- Tarjima -->
                    <div class="mb-10 pt-8 border-t border-black/5">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-4 tracking-widest uppercase">Tarjima</h4>
                        <p class="text-2xl md:text-3xl leading-relaxed italic opacity-90">${i.tarjima}</p>
                    </div>

                    <!-- Izoh -->
                    ${i.izoh ? `
                    <div class="p-6 md:p-10 bg-black/5 rounded-3xl mt-6 border border-black/5">
                        <h4 class="text-[10px] font-bold text-amber-800 mb-3 tracking-widest uppercase">Izoh</h4>
                        <p class="text-base leading-relaxed opacity-80">${i.izoh}</p>
                    </div>` : ''}
                </article>
            `).join('');
        }

        function changeMode(mode) {
            document.body.className = mode + '-mode font-main min-h-screen';
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = items.filter(i => 
                i.arabcha_matn.includes(q) || i.tarjima.toLowerCase().includes(q)
            );
            render(filtered);
        });

        init();
    </script>
</body>
</html>
