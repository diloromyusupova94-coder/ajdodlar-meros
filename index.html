<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVODOD | Raqamli Meros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #111827; }
        .font-arab { font-family: 'Amiri', serif; }
        .font-serif { font-family: 'Lora', serif; }

        .page-view { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .page-view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .list-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #f1f1f1;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-card:hover { border-color: #059669; transform: translateX(5px); }

        .mode-tab {
            flex: 1; text-align: center; padding: 15px 0; font-size: 13px; font-weight: 600;
            color: #9ca3af; cursor: pointer; border-top: 2px solid transparent;
        }
        .mode-tab.active { color: #059669; border-top-color: #059669; background: white; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; z-index: 100; }
    </style>
</head>
<body>

    <!-- 1. OLIMLAR OYNASI -->
    <section id="page-scholars" class="page-view active">
        <header class="p-8 text-center">
            <h1 class="text-3xl font-black tracking-widest uppercase italic mb-2">Avodod</h1>
            <p class="text-gray-400 text-xs tracking-widest uppercase">Olimni tanlang</p>
        </header>
        <main class="max-w-xl mx-auto px-6">
            <div class="list-card" onclick="openWorks('xorazmiy', 'Al-Xorazmiy')">
                <span>Al-Xorazmiy</span> <span class="text-gray-300">→</span>
            </div>
            <div class="list-card" onclick="openWorks('beruniy', 'Abu Rayhon Beruniy')">
                <span>Abu Rayhon Beruniy</span> <span class="text-gray-300">→</span>
            </div>
            <div class="list-card" onclick="openWorks('ibnsino', 'Ibn Sino')">
                <span>Ibn Sino</span> <span class="text-gray-300">→</span>
            </div>
        </main>
    </section>

    <!-- 2. ASARLAR OYNASI -->
    <section id="page-works" class="page-view">
        <header class="p-6 border-b flex items-center bg-white sticky top-0 z-10">
            <button onclick="showPage('page-scholars')" class="mr-4 text-gray-400">←</button>
            <h2 id="current-scholar-name" class="font-bold uppercase text-sm tracking-widest">Asarlar</h2>
        </header>
        <main id="works-list" class="max-w-xl mx-auto px-6 py-8">
            <!-- Asarlar ro'yxati shu yerga keladi -->
        </main>
    </section>

    <!-- 3. MATN OYNASI (READER) -->
    <section id="page-reader" class="page-view">
        <header class="p-6 border-b flex items-center bg-white sticky top-0 z-10">
            <button onclick="showPage('page-works')" class="mr-4 text-gray-400">←</button>
            <h2 id="current-work-name" class="font-bold uppercase text-sm tracking-widest truncate">Matn</h2>
        </header>
        
        <main class="max-w-xl mx-auto px-6 pt-6 pb-32">
            <div id="reader-arab" class="reader-content hidden"></div>
            <div id="reader-tarjima" class="reader-content"></div>
            <div id="reader-izoh" class="reader-content hidden"></div>
        </main>

        <nav class="bottom-nav">
            <div onclick="switchMode('arab')" id="tab-arab" class="mode-tab">Arabcha</div>
            <div onclick="switchMode('tarjima')" id="tab-tarjima" class="mode-tab active">Tarjima</div>
            <div onclick="switchMode('izoh')" id="tab-izoh" class="mode-tab">Izoh</div>
        </nav>
    </section>

    <script>
        let currentScholar = "";
        let workData = [];

        // Sahifani almashtirish
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Olim tanlanganda asarlarini ko'rsatish
        function openWorks(folder, name) {
            currentScholar = folder;
            document.getElementById('current-scholar-name').innerText = name;
            
            // Asarlar ro'yxati (Buni JSON'dan ham olsa bo'ladi, hozircha qo'lda misol)
            const works = {
                'xorazmiy': [{ id: 'al-jabr', title: 'Al-Kitob al-muxtasar fi hisob al-jabr' }],
                'beruniy': [{ id: 'hindiston', title: 'Tahqiq ma lil-Hind' }],
                'ibnsino': [{ id: 'qonun', title: 'Al-Qonun fit-tib' }]
            };

            const listContainer = document.getElementById('works-list');
            listContainer.innerHTML = works[folder].map(work => `
                <div class="list-card" onclick="loadWork('${work.id}', '${work.title}')">
                    <span>${work.title}</span> <span class="text-gray-300">→</span>
                </div>
            `).join('');

            showPage('page-works');
        }

        // Asarni yuklash va o'qish oynasini ochish
        async function loadWork(file, title) {
            document.getElementById('current-work-name').innerText = title;
            
            try {
                const res = await fetch(`sources/${currentScholar}/${file}.json`);
                workData = await res.json();
                renderReader();
                showPage('page-reader');
                switchMode('tarjima'); // Standart tarjima rejimi
            } catch (err) {
                alert("Fayl topilmadi!");
            }
        }

        // Rejimni o'zgartirish
        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');

            document.querySelectorAll('.reader-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('reader-' + mode).classList.remove('hidden');
        }

        // Matnlarni oynalarga joylash
        function renderReader() {
            const arab = document.getElementById('reader-arab');
            const tarjima = document.getElementById('reader-tarjima');
            const izoh = document.getElementById('reader-izoh');

            arab.innerHTML = workData.map((item, i) => `
                <div class="py-8 border-b text-right font-arab text-4xl leading-loose">
                    ${item.arabcha_matn} <span class="text-xs font-sans opacity-20">[${i+1}]</span>
                </div>`).join('');

            tarjima.innerHTML = workData.map((item, i) => `
                <div class="py-8 border-b">
                    <span class="text-[10px] font-bold text-gray-300 uppercase mb-2 block">${i+1}-band</span>
                    <p class="text-xl font-serif leading-relaxed text-gray-800">${item.tarjima}</p>
                </div>`).join('');

            izoh.innerHTML = workData.map((item, i) => `
                <div class="py-8 border-b italic text-gray-600 font-serif text-lg">
                    <span class="text-[10px] font-bold text-green-600 uppercase block mb-2">Sharh ${i+1}</span>
                    ${item.izoh || "Izoh mavjud emas."}
                </div>`).join('');
        }
    </script>
</body>
</html>
